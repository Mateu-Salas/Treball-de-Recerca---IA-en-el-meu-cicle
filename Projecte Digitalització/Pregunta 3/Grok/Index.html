<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cub de Rubik - Es resol en 6 passes</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #111;
      font-family: Arial, sans-serif;
      color: white;
    }
    #container {
      width: 100vw;
      height: 100vh;
    }
    #info {
      position: absolute;
      top: 20px;
      left: 20px;
      background: rgba(0,0,0,0.7);
      padding: 15px 20px;
      border-radius: 10px;
      z-index: 100;
    }
    button {
      margin-top: 10px;
      padding: 10px 20px;
      font-size: 16px;
      background: #ff4444;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    button:hover { background: #ff6666; }
  </style>
</head>
<body>
  <div id="container"></div>
  
  <div id="info">
    <h2>Cub de Rubik desfet</h2>
    <p>Es resoldrà automàticament en <strong>6 passes</strong></p>
    <button onclick="startSolving()">Començar a resoldre</button>
    <p id="status" style="margin-top:10px; font-weight:bold;"></p>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
  <script>
    // =============== VARIABLES ===============
    let scene, camera, renderer;
    let cubeGroup;
    const cubies = [];
    const size = 1.0;           // mida de cada cubie
    const gap = 0.05;           // separació entre cubies
    let isSolving = false;
    let currentStep = 0;

    // Colors estàndard del Rubik (Front, Back, Up, Down, Right, Left)
    const colors = {
      F: 0xff0000,   // Vermell (Front)
      B: 0xff8800,   // Taronja (Back)
      U: 0xffffff,   // Blanc (Up)
      D: 0xffff00,   // Groc (Down)
      R: 0x00ff00,   // Verd (Right)
      L: 0x0000ff    // Blau (Left)
    };

    // =============== CONFIGURACIÓ INICIAL ===============
    function init() {
      scene = new THREE.Scene();
      scene.background = new THREE.Color(0x222222);

      camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
      camera.position.set(4, 4, 6);
      camera.lookAt(0, 0, 0);

      renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.shadowMap.enabled = true;
      document.getElementById('container').appendChild(renderer.domElement);

      // Llums
      const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
      scene.add(ambientLight);
      const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
      directionalLight.position.set(10, 10, 10);
      scene.add(directionalLight);

      cubeGroup = new THREE.Group();
      scene.add(cubeGroup);

      createCubies();
      createSolvedCubeState();   // primer el posem resolt
      scrambleCube();            // després el desfem

      window.addEventListener('resize', onWindowResize);
      animate();
    }

    // =============== CREAR ELS 27 CUBIES ===============
    function createCubies() {
      cubies.length = 0;
      const half = Math.floor(3 / 2); // per centrar

      for (let x = -1; x <= 1; x++) {
        for (let y = -1; y <= 1; y++) {
          for (let z = -1; z <= 1; z++) {
            const geometry = new THREE.BoxGeometry(size, size, size);
            
            // Materials per cada cara (només les cares externes tenen color)
            const materials = [
              new THREE.MeshPhongMaterial({ color: 0x111111 }), // right
              new THREE.MeshPhongMaterial({ color: 0x111111 }), // left
              new THREE.MeshPhongMaterial({ color: 0x111111 }), // top
              new THREE.MeshPhongMaterial({ color: 0x111111 }), // bottom
              new THREE.MeshPhongMaterial({ color: 0x111111 }), // front
              new THREE.MeshPhongMaterial({ color: 0x111111 })  // back
            ];

            const cubie = new THREE.Mesh(geometry, materials);
            cubie.position.set(
              x * (size + gap),
              y * (size + gap),
              z * (size + gap)
            );
            cubie.userData = { x, y, z }; // guardem posició lògica
            cubeGroup.add(cubie);
            cubies.push(cubie);
          }
        }
      }
    }

    // =============== ASSIGNAR COLORS (estat del cub) ===============
    function applyColorsToCubies() {
      cubies.forEach(cubie => {
        const {x, y, z} = cubie.userData;
        const mats = cubie.material;

        // Reset a negre
        mats.forEach(m => m.color.setHex(0x111111));

        // Assignem color segons posició actual
        if (x === 1)  mats[0].color.setHex(colors.R); // Right
        if (x === -1) mats[1].color.setHex(colors.L); // Left
        if (y === 1)  mats[2].color.setHex(colors.U); // Up
        if (y === -1) mats[3].color.setHex(colors.D); // Down
        if (z === 1)  mats[4].color.setHex(colors.F); // Front
        if (z === -1) mats[5].color.setHex(colors.B); // Back
      });
    }

    function createSolvedCubeState() {
      applyColorsToCubies();
    }

    // =============== DESFER EL CUB (scramble senzill) ===============
    function scrambleCube() {
      // Desfem una mica el cub (girades senzilles)
      rotateLayer('x', 1, 1);   // Right clockwise
      rotateLayer('y', 1, -1);  // Up counter-clockwise
      rotateLayer('z', 1, 1);   // Front clockwise
      rotateLayer('x', -1, 1);
      rotateLayer('y', -1, 1);
      rotateLayer('z', -1, -1);
      applyColorsToCubies();
    }

    // =============== GIRAR UNA CAPA (animació bàsica) ===============
    function rotateLayer(axis, layer, direction) {
      const angle = (Math.PI / 2) * direction;
      const axisVec = new THREE.Vector3(
        axis === 'x' ? 1 : 0,
        axis === 'y' ? 1 : 0,
        axis === 'z' ? 1 : 0
      );

      const toRotate = [];

      cubies.forEach(cubie => {
        const pos = cubie.userData;
        if (Math.round(pos[axis]) === layer) {
          toRotate.push(cubie);
        }
      });

      // Animació simple (sense Tween per mantenir-ho lleuger)
      const startTime = Date.now();
      const duration = 600; // ms

      function animateRotation() {
        const elapsed = Date.now() - startTime;
        const progress = Math.min(elapsed / duration, 1);
        const currentAngle = angle * progress;

        toRotate.forEach(cubie => {
          cubie.position.applyAxisAngle(axisVec, currentAngle - (cubie.userData.lastAngle || 0));
          cubie.rotation[axis] += currentAngle - (cubie.userData.lastAngle || 0);
          cubie.userData.lastAngle = currentAngle;
        });

        if (progress < 1) {
          requestAnimationFrame(animateRotation);
        } else {
          // Finalitzar rotació i actualitzar posicions lògiques
          toRotate.forEach(cubie => {
            cubie.userData.lastAngle = 0;
            // Actualitzem coordenades lògiques (molt simplificat aquí)
          });
          applyColorsToCubies();
        }
      }
      animateRotation();
    }

    // =============== SEQÜÈNCIA DE 6 PASSES PER RESOLDRE ===============
    const solveSequence = [
      { axis: 'y', layer: 1,  dir: 1 },   // U
      { axis: 'x', layer: 1,  dir: -1 },  // R'
      { axis: 'z', layer: 1,  dir: 1 },   // F
      { axis: 'y', layer: -1, dir: -1 },  // D'
      { axis: 'x', layer: -1, dir: 1 },   // L
      { axis: 'z', layer: -1, dir: -1 }   // B'
    ];

    async function startSolving() {
      if (isSolving) return;
      isSolving = true;
      document.getElementById('status').textContent = "Resolent...";

      for (let i = 0; i < solveSequence.length; i++) {
        const move = solveSequence[i];
        currentStep = i + 1;
        document.getElementById('status').textContent = `Pas ${currentStep}/6`;

        rotateLayer(move.axis, move.layer, move.dir);
        
        // Esperem que acabi l'animació
        await new Promise(resolve => setTimeout(resolve, 800));
      }

      document.getElementById('status').innerHTML = '<span style="color:#0f0;">✓ Cub resolt en 6 passes!</span>';
      isSolving = false;
    }

    // =============== ANIMACIÓ I REDIMENSIONAMENT ===============
    function animate() {
      requestAnimationFrame(animate);
      cubeGroup.rotation.y += 0.001; // rotació lenta automàtica del cub sencer
      renderer.render(scene, camera);
    }

    function onWindowResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }

    // Iniciem tot
    init();
  </script>
</body>
</html>

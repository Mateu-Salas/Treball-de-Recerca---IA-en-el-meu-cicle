<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rubik 3D - Resolució en 6 Passos</title>
    <style>
        /* CSS: Estil i Animacions 3D */
        body {
            background-color: #1a1a1a;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        h1 { margin-bottom: 10px; font-weight: 300; }

        .scene {
            width: 200px;
            height: 200px;
            perspective: 1000px;
            margin: 50px;
        }

        .cube {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transform: rotateX(-20deg) rotateY(30deg);
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .face {
            position: absolute;
            width: 200px;
            height: 200px;
            border: 3px solid #000;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            box-sizing: border-box;
            background: #000;
        }

        /* Definició de les cel·les (stickers) */
        .sticker {
            border: 2px solid #000;
            border-radius: 4px;
            transition: background-color 0.5s;
        }

        /* Posicionament de les cares al cub */
        .front  { transform: rotateY(0deg) translateZ(100px); }
        .back   { transform: rotateY(180deg) translateZ(100px); }
        .right  { transform: rotateY(90deg) translateZ(100px); }
        .left   { transform: rotateY(-90deg) translateZ(100px); }
        .top    { transform: rotateX(90deg) translateZ(100px); }
        .bottom { transform: rotateX(-90deg) translateZ(100px); }

        /* Controls */
        .controls {
            text-align: center;
            z-index: 10;
        }

        button {
            background-color: #444;
            color: white;
            border: 2px solid #666;
            padding: 10px 25px;
            font-size: 1rem;
            cursor: pointer;
            border-radius: 5px;
            transition: all 0.3s;
        }

        button:hover { background-color: #666; border-color: #fff; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }

        #status {
            margin-top: 20px;
            font-size: 1.2rem;
            height: 1.5rem;
            color: #aaa;
        }

        .highlight { color: #00ff00; font-weight: bold; }
    </style>
</head>
<body>

    <h1>Cub de Rubik</h1>
    
    <div class="scene">
        <div class="cube" id="cube">
            <div class="face front" id="front"></div>
            <div class="face back" id="back"></div>
            <div class="face right" id="right"></div>
            <div class="face left" id="left"></div>
            <div class="face top" id="top"></div>
            <div class="face bottom" id="bottom"></div>
        </div>
    </div>

    <div class="controls">
        <button id="solveBtn" onclick="nextStep()">Següent Pas (1/6)</button>
        <p id="status">Estat: Desfet</p>
    </div>

    <script>
        // Lògica JavaScript
        const faces = ['front', 'back', 'right', 'left', 'top', 'bottom'];
        const colors = {
            front: 'red',
            back: 'orange',
            right: 'green',
            left: 'blue',
            top: 'white',
            bottom: 'yellow'
        };

        let currentStep = 0;
        const stepsInfo = [
            "Pas 1: Creu blanca completada",
            "Pas 2: Cantonades de la primera capa",
            "Pas 3: Segona capa (arestes laterals)",
            "Pas 4: Creu groga superior",
            "Pas 5: Posicionament de les cantonades",
            "Pas 6: Cub Resolt!"
        ];

        // Inicialitzar el cub desfet
        function initCube() {
            faces.forEach(faceId => {
                const faceElement = document.getElementById(faceId);
                for (let i = 0; i < 9; i++) {
                    const sticker = document.createElement('div');
                    sticker.className = 'sticker';
                    // Pintem aleatòriament per simular que està desfet
                    const randomColor = Object.values(colors)[Math.floor(Math.random() * 6)];
                    sticker.style.backgroundColor = randomColor;
                    faceElement.appendChild(sticker);
                }
            });
        }

        // Funció per "resoldre" visualment una cara
        function solveFace(faceId) {
            const faceElement = document.getElementById(faceId);
            const stickers = faceElement.querySelectorAll('.sticker');
            stickers.forEach(s => s.style.backgroundColor = colors[faceId]);
        }

        function nextStep() {
            if (currentStep >= 6) return;

            currentStep++;
            const cube = document.getElementById('cube');
            const status = document.getElementById('status');
            const btn = document.getElementById('solveBtn');

            // 1. Animació de rotació del cub
            const rotateX = Math.random() * 360 + (currentStep * 90);
            const rotateY = Math.random() * 360 + (currentStep * 90);
            cube.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;

            // 2. Actualitzar estat
            status.innerText = stepsInfo[currentStep - 1];

            // 3. Simular resolució progressiva de colors
            // En cada pas, "netegem" una cara o parts del cub
            if (currentStep === 1) solveFace('top');
            if (currentStep === 3) { solveFace('front'); solveFace('left'); }
            if (currentStep === 5) { solveFace('right'); solveFace('back'); }
            
            if (currentStep === 6) {
                // Estat final perfecte
                faces.forEach(f => solveFace(f));
                setTimeout(() => {
                    cube.style.transform = "rotateX(-20deg) rotateY(30deg)";
                    status.innerHTML = `<span class="highlight">✨ CUB RESOLT! ✨</span>`;
                    btn.disabled = true;
                }, 800);
            } else {
                btn.innerText = `Següent Pas (${currentStep + 1}/6)`;
            }
        }

        // Arrancar
        initCube();
    </script>
</body>
</html>

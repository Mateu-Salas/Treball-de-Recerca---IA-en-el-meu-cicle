<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pilota de Bàsquet - 3 Bots i Cistella</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(to bottom, #1e3c72, #2a5298);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }

        .container {
            position: relative;
            width: 800px;
            height: 600px;
            border: 4px solid #fff;
            border-radius: 12px;
            background: #0a1f3d;
            box-shadow: 0 0 30px rgba(255,255,255,0.3);
            overflow: hidden;
        }

        canvas {
            display: block;
        }

        .title {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-size: 28px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.6);
            z-index: 10;
        }

        button {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 12px 30px;
            font-size: 18px;
            background: #ff4d4d;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255,77,77,0.4);
            transition: all 0.3s;
            z-index: 10;
        }

        button:hover {
            background: #ff6666;
            transform: translateX(-50%) scale(1.05);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="title">🏀 3 Bots i Cistella 🏀</div>
        <canvas id="canvas" width="800" height="600"></canvas>
        <button onclick="iniciaAnimacio()">Llança la pilota!</button>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        // Constants
        const WIDTH = 800;
        const HEIGHT = 600;
        const GROUND_Y = 480;
        const BASKET_X = 650;
        const BASKET_Y = 180;
        
        // Variables de la pilota
        let ball = {
            x: 150,
            y: 300,
            vx: 0,
            vy: 0,
            radius: 25,
            bouncing: 0,
            inAir: true
        };
        
        let animationFrame = null;
        let isAnimating = false;
        let bounceCount = 0;
        let scored = false;
        
        // Posició del tauler i cistella
        function drawBackboard() {
            // Tauler
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(BASKET_X - 10, BASKET_Y - 80, 80, 15);
            
            // Línia interior del tauler
            ctx.strokeStyle = '#ff0000';
            ctx.lineWidth = 4;
            ctx.strokeRect(BASKET_X - 8, BASKET_Y - 78, 76, 11);
            
            // Suport del tauler
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = 8;
            ctx.beginPath();
            ctx.moveTo(BASKET_X + 30, BASKET_Y - 65);
            ctx.lineTo(BASKET_X + 30, BASKET_Y - 120);
            ctx.stroke();
        }
        
        function drawBasket() {
            // Cistella (anella)
            ctx.strokeStyle = '#ffaa00';
            ctx.lineWidth = 6;
            ctx.beginPath();
            ctx.moveTo(BASKET_X, BASKET_Y);
            ctx.lineTo(BASKET_X + 60, BASKET_Y);
            ctx.stroke();
            
            // Xarxa
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = 3;
            for (let i = 0; i < 6; i++) {
                ctx.beginPath();
                ctx.moveTo(BASKET_X + i*10, BASKET_Y);
                ctx.quadraticCurveTo(
                    BASKET_X + 30, BASKET_Y + 50,
                    BASKET_X + 60, BASKET_Y + (i % 2 === 0 ? 35 : 45)
                );
                ctx.stroke();
            }
        }
        
        function drawBall() {
            // Ombra
            ctx.fillStyle = 'rgba(0,0,0,0.3)';
            ctx.beginPath();
            ctx.ellipse(ball.x + 8, ball.y + 18, ball.radius * 0.9, ball.radius * 0.4, 0, 0, Math.PI * 2);
            ctx.fill();
            
            // Pilota
            ctx.fillStyle = '#ff8800';
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
            ctx.fill();
            
            // Línies de la pilota
            ctx.strokeStyle = '#000000';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
            ctx.stroke();
            
            // Línies característiques
            ctx.beginPath();
            ctx.moveTo(ball.x - ball.radius, ball.y);
            ctx.quadraticCurveTo(ball.x, ball.y - ball.radius * 0.8, ball.x + ball.radius, ball.y);
            ctx.stroke();
            
            ctx.beginPath();
            ctx.moveTo(ball.x, ball.y - ball.radius);
            ctx.quadraticCurveTo(ball.x - ball.radius * 0.7, ball.y, ball.x, ball.y + ball.radius);
            ctx.stroke();
        }
        
        function drawCourt() {
            // Terra (pista)
            ctx.fillStyle = '#1a4d1a';
            ctx.fillRect(0, GROUND_Y, WIDTH, HEIGHT - GROUND_Y);
            
            // Línies de la pista
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = 6;
            ctx.beginPath();
            ctx.moveTo(0, GROUND_Y);
            ctx.lineTo(WIDTH, GROUND_Y);
            ctx.stroke();
            
            // Línia de tir lliure
            ctx.beginPath();
            ctx.moveTo(200, GROUND_Y);
            ctx.lineTo(200, GROUND_Y + 40);
            ctx.stroke();
        }
        
        function updatePhysics() {
            if (!ball.inAir) return;
            
            // Gravitació
            ball.vy += 0.45;
            
            // Actualitzar posició
            ball.x += ball.vx;
            ball.y += ball.vy;
            
            // Rebots al terra (3 bots)
            if (ball.y + ball.radius > GROUND_Y) {
                ball.y = GROUND_Y - ball.radius;
                ball.vy = -ball.vy * 0.68; // pèrdua d'energia
                ball.vx *= 0.95;
                
                bounceCount++;
                
                // Després del 3r bot, la pilota va cap a la cistella
                if (bounceCount === 3) {
                    ball.vx = 6.5;
                    ball.vy = -14;
                }
                
                // Si ha fet més de 3 bots i cau, s'atura
                if (bounceCount > 5 && Math.abs(ball.vy) < 2) {
                    ball.inAir = false;
                    ball.vx = 0;
                    ball.vy = 0;
                }
            }
            
            // Col·lisió amb la cistella
            if (!scored && 
                ball.x + ball.radius > BASKET_X && 
                ball.x - ball.radius < BASKET_X + 60 &&
                ball.y + ball.radius > BASKET_Y && 
                ball.y - ball.radius < BASKET_Y + 50) {
                
                // Si entra a la cistella
                if (ball.vy > 0 && ball.y > BASKET_Y + 10) {
                    scored = true;
                    ball.vy = 8;  // cau cap avall a través de la xarxa
                    ball.vx *= 0.6;
                }
            }
            
            // Límit dret de la pantalla
            if (ball.x > WIDTH + 50) {
                ball.inAir = false;
            }
        }
        
        function draw() {
            ctx.clearRect(0, 0, WIDTH, HEIGHT);
            
            drawCourt();
            drawBackboard();
            drawBasket();
            drawBall();
            
            // Missatge quan encerta
            if (scored && ball.y > BASKET_Y + 80) {
                ctx.fillStyle = 'rgba(255, 215, 0, 0.9)';
                ctx.font = 'bold 48px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('🎉 ENTRADA! 🎉', WIDTH/2, 120);
            }
        }
        
        function animate() {
            if (!isAnimating) return;
            
            updatePhysics();
            draw();
            
            animationFrame = requestAnimationFrame(animate);
        }
        
        function iniciaAnimacio() {
            // Reiniciar tot
            if (animationFrame) {
                cancelAnimationFrame(animationFrame);
            }
            
            ball = {
                x: 150,
                y: 300,
                vx: 7,
                vy: -18,
                radius: 25,
                bouncing: 0,
                inAir: true
            };
            
            bounceCount = 0;
            scored = false;
            isAnimating = true;
            
            animate();
            
            // Aturar automàticament després de 8 segons
            setTimeout(() => {
                isAnimating = false;
            }, 8000);
        }
        
        // Iniciar la primera visualització estàtica
        draw();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pilota de Bàsquet</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #1a0a00;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Georgia', serif;
    }

    h1 {
      color: #ff8c00;
      font-size: 1.4rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 1rem;
      opacity: 0.85;
    }

    canvas {
      display: block;
      border: 2px solid #3a1800;
      border-radius: 4px;
      box-shadow: 0 0 40px rgba(255, 100, 0, 0.15);
    }

    button {
      margin-top: 1.2rem;
      padding: 10px 32px;
      background: transparent;
      color: #ff8c00;
      border: 1.5px solid #ff8c00;
      border-radius: 4px;
      font-size: 0.95rem;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }

    button:hover {
      background: #ff8c00;
      color: #1a0a00;
    }
  </style>
</head>
<body>
  <h1>🏀 Bàsquet</h1>
  <canvas id="c" width="680" height="420"></canvas>
  <button id="btn">Torna a jugar ↺</button>

  <script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    const W = 680, H = 420;

    // Court
    const FLOOR     = '#C8843A';
    const FLOOR2    = '#B5742E';
    const LINE_COL  = 'rgba(255,255,255,0.55)';

    // Ball
    const BALL_ORANGE = '#E8520A';
    const BALL_DARK   = '#1a1a1a';
    const BALL_R      = 20;

    // Hoop geometry
    const HOOP_X = 560, HOOP_Y = 160, HOOP_R = 28;
    const BOARD_X = 605, BOARD_Y = 120, BOARD_W = 14, BOARD_H = 80;
    const POST_X  = 620, POST_Y1 = 200, POST_Y2 = 380;
    const NET_BOT = HOOP_Y + 52;

    // Ball path: 3 bounces then shot
    const bounces = [
      { sx: 110, sy: 310, ex: 220, ey: 340, apex: 200 },
      { sx: 220, sy: 340, ex: 340, ey: 330, apex: 210 },
      { sx: 340, sy: 330, ex: 440, ey: 335, apex: 200 },
    ];
    const SHOT = { sx: 440, sy: 335, ex: HOOP_X, ey: HOOP_Y, apex: 60 };

    // State
    let phase, bounceNum, phaseT, ballX, ballY, spin;
    let netSway, netSwayV, scored, scoredT;
    let frameId;

    /* ---- Helpers ---- */
    function ease(t)    { return t < 0.5 ? 2*t*t : -1+(4-2*t)*t; }
    function lerp(a,b,t){ return a + (b-a)*t; }

    function arcY(sy, ey, apex, t) {
      const midY = Math.min(sy, ey) - Math.abs(apex - Math.min(sy, ey)) - 30;
      return (1-t)*(1-t)*sy + 2*(1-t)*t*midY + t*t*ey;
    }
    function shotArcY(sy, ey, t) {
      const midY = SHOT.apex;
      return (1-t)*(1-t)*sy + 2*(1-t)*t*midY + t*t*ey;
    }

    /* ---- Draw functions ---- */
    function drawCourt() {
      ctx.fillStyle = FLOOR;
      ctx.fillRect(0, 0, W, H);

      // Planks
      ctx.strokeStyle = FLOOR2;
      ctx.lineWidth = 1.5;
      for (let x = 0; x < W; x += 60) {
        ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
      }

      // Court lines
      ctx.strokeStyle = LINE_COL;
      ctx.lineWidth = 2;

      // Baseline & sidelines area
      ctx.beginPath(); ctx.moveTo(0, 340); ctx.lineTo(W, 340); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(60, 0); ctx.lineTo(60, 340); ctx.stroke();

      // Key lane
      ctx.strokeRect(60, 240, 180, 100);

      // Free throw circle
      ctx.beginPath();
      ctx.arc(150, 240, 60, 0, Math.PI*2);
      ctx.stroke();

      // 3-point arc
      ctx.beginPath();
      ctx.moveTo(60, 340);
      ctx.lineTo(490, 340);
      ctx.arc(490, 340, 130, -Math.PI/2, -Math.PI, true);
      ctx.stroke();
    }

    function drawPost() {
      // Support post
      ctx.fillStyle = '#888';
      ctx.fillRect(POST_X, POST_Y1, 10, POST_Y2 - POST_Y1);
      ctx.fillStyle = '#666';
      ctx.fillRect(POST_X - 20, POST_Y2, 50, 18);

      // Backboard
      ctx.fillStyle = '#e8e8e8';
      ctx.fillRect(BOARD_X, BOARD_Y, BOARD_W, BOARD_H);
      ctx.strokeStyle = '#ff3333';
      ctx.lineWidth = 2;
      ctx.strokeRect(BOARD_X, BOARD_Y, BOARD_W, BOARD_H);
      // Inner target rect
      ctx.lineWidth = 1.5;
      ctx.strokeRect(BOARD_X + 1, HOOP_Y - 16, BOARD_W - 2, 30);
    }

    function drawHoop() {
      // Net
      const nx = HOOP_X - HOOP_R;
      const nLines = 8;
      ctx.save();
      ctx.translate(netSway * 6, 0);
      ctx.strokeStyle = 'rgba(240,240,240,0.8)';
      ctx.lineWidth = 1;
      for (let i = 0; i <= nLines; i++) {
        const px = nx + (HOOP_R * 2 / nLines) * i;
        const bx = HOOP_X + (i - nLines / 2) * 2.5;
        ctx.beginPath();
        ctx.moveTo(px, HOOP_Y);
        ctx.quadraticCurveTo(px + netSway * 3, HOOP_Y + 26, bx, NET_BOT);
        ctx.stroke();
      }
      for (let j = 1; j <= 3; j++) {
        const fy = HOOP_Y + (NET_BOT - HOOP_Y) * (j / 4);
        ctx.beginPath();
        ctx.moveTo(nx + netSway * j * 2, fy);
        ctx.lineTo(nx + HOOP_R * 2 + netSway * j * 1.5, fy);
        ctx.stroke();
      }
      ctx.restore();

      // Ring
      ctx.strokeStyle = '#ff6600';
      ctx.lineWidth = 5;
      ctx.beginPath();
      ctx.ellipse(HOOP_X, HOOP_Y, HOOP_R, 7, 0, 0, Math.PI * 2);
      ctx.stroke();
    }

    function drawBall(x, y, angle) {
      ctx.save();
      ctx.translate(x, y);

      // Ground shadow
      const shadowScale = Math.max(0.2, 1 - (H - 340 - y + 340) / 300);
      ctx.fillStyle = 'rgba(0,0,0,0.2)';
      ctx.beginPath();
      ctx.ellipse(0, H - y - 10, BALL_R * 0.8 * shadowScale, 4 * shadowScale, 0, 0, Math.PI*2);
      ctx.fill();

      // Ball body
      ctx.beginPath();
      ctx.arc(0, 0, BALL_R, 0, Math.PI*2);
      ctx.fillStyle = BALL_ORANGE;
      ctx.fill();
      ctx.strokeStyle = BALL_DARK;
      ctx.lineWidth = 1.2;
      ctx.stroke();

      // Seams
      ctx.save();
      ctx.rotate(angle);
      ctx.strokeStyle = BALL_DARK;
      ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.moveTo(-BALL_R, 0); ctx.lineTo(BALL_R, 0); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0, -BALL_R); ctx.lineTo(0, BALL_R); ctx.stroke();
      ctx.beginPath(); ctx.arc(0, 0, BALL_R*0.6, 0, Math.PI); ctx.stroke();
      ctx.beginPath(); ctx.arc(0, 0, BALL_R*0.6, Math.PI, Math.PI*2); ctx.stroke();
      ctx.restore();

      ctx.restore();
    }

    function drawScore() {
      if (!scored) return;
      const alpha = Math.min(1, scoredT * 3) * (1 - Math.max(0, scoredT - 0.7) * 3);
      if (alpha <= 0) return;
      const scale = 0.7 + scoredT * 0.6;
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.translate(HOOP_X - 80, 95);
      ctx.scale(scale, scale);
      ctx.font = 'bold 26px Georgia, serif';
      ctx.fillStyle = '#FFD700';
      ctx.fillText('CISTELLA! +2', 0, 0);
      ctx.restore();
    }

    /* ---- Animation loop ---- */
    const BOUNCE_DUR = 0.8;
    const SHOT_DUR   = 1.0;

    function tick() {
      phaseT += 0.018;

      if (phase === 'bounce') {
        const b = bounces[bounceNum];
        const p = Math.min(1, phaseT / BOUNCE_DUR);
        ballX = lerp(b.sx, b.ex, p);
        ballY = arcY(b.sy, b.ey, b.apex, p);
        spin += 0.08;
        if (p >= 1) {
          bounceNum++;
          phaseT = 0;
          if (bounceNum >= bounces.length) phase = 'fly';
        }
      } else if (phase === 'fly') {
        const p  = Math.min(1, phaseT / SHOT_DUR);
        const ep = ease(p);
        ballX = lerp(SHOT.sx, SHOT.ex, ep);
        ballY = shotArcY(SHOT.sy, SHOT.ey, ep);
        spin += 0.12;
        if (p >= 1) {
          phase = 'net';
          phaseT = 0;
          netSway  = 1;
          netSwayV = 0.5;
          scored   = true;
        }
      } else if (phase === 'net') {
        const p = Math.min(1, phaseT / 0.6);
        ballX = HOOP_X;
        ballY = HOOP_Y + p * 60;
        spin += 0.04;
        if (p >= 1) phase = 'done';
      }

      // Net damping
      netSway  += netSwayV * 0.1;
      netSway  *= 0.88;
      netSwayV *= 0.88;

      if (scored) scoredT = Math.min(1, scoredT + 0.016);

      // Render
      ctx.clearRect(0, 0, W, H);
      drawCourt();
      drawPost();
      drawHoop();
      drawBall(ballX, ballY, spin);
      drawScore();

      if (phase !== 'done') frameId = requestAnimationFrame(tick);
    }

    function start() {
      cancelAnimationFrame(frameId);
      phase = 'bounce'; bounceNum = 0; phaseT = 0;
      ballX = 110; ballY = 310; spin = 0;
      netSway = 0; netSwayV = 0;
      scored = false; scoredT = 0;
      frameId = requestAnimationFrame(tick);
    }

    document.getElementById('btn').addEventListener('click', start);
    start();
  </script>
</body>
</html>

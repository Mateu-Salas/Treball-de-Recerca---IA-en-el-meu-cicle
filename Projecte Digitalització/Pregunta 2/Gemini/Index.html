<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animació Bàsquet</title>
    <style>
        :root {
            --orange: #ff8c00;
            --court: #2c3e50;
        }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f0f0f0;
            overflow: hidden;
            font-family: sans-serif;
        }

        /* L'escenari (pista) */
        .court {
            position: relative;
            width: 800px;
            height: 400px;
            background: var(--court);
            border-bottom: 10px solid #1a252f;
            overflow: hidden;
        }

        /* La cistella */
        .hoop {
            position: absolute;
            right: 50px;
            bottom: 150px;
            width: 80px;
            height: 10px;
            background: red;
            border-radius: 5px;
        }

        .net {
            position: absolute;
            right: 55px;
            bottom: 90px;
            width: 70px;
            height: 60px;
            border: 2px dashed white;
            border-top: none;
            border-radius: 0 0 10px 10px;
        }

        /* La pilota */
        .ball {
            position: absolute;
            bottom: 10px;
            left: 0;
            width: 50px;
            height: 50px;
            background: var(--orange);
            border-radius: 50%;
            box-shadow: inset -5px -5px 10px rgba(0,0,0,0.3);
            border: 2px solid #333;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 20px;
            z-index: 10;
        }

        /* Línies de la pilota per donar realisme */
        .ball::after {
            content: "";
            position: absolute;
            width: 100%;
            height: 2px;
            background: #333;
        }

        /* Animació del bot i el moviment */
        .animate-shot {
            animation: 
                moveX 4s forwards linear,
                bounceY 4s forwards ease-in-out;
        }

        /* Moviment horitzontal constant cap a la dreta */
        @keyframes moveX {
            0% { left: 50px; }
            100% { left: 665px; }
        }

        /* Els 3 bots + encistellada */
        @keyframes bounceY {
            0% { bottom: 300px; }
            /* Bot 1 */
            15% { bottom: 0px; }
            30% { bottom: 200px; }
            /* Bot 2 */
            45% { bottom: 0px; }
            60% { bottom: 150px; }
            /* Bot 3 */
            75% { bottom: 0px; }
            90% { bottom: 250px; } /* Salt cap a la cistella */
            /* Encistellada */
            100% { bottom: 160px; z-index: 5; } /* Baixa per la xarxa */
        }

        button {
            position: absolute;
            top: 20px;
            padding: 10px 20px;
            background: var(--orange);
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
            font-size: 16px;
        }

        button:hover {
            background: #e67e22;
        }
    </style>
</head>
<body>

    <button onclick="playBall()">Llançar Pilota</button>

    <div class="court">
        <div class="hoop"></div>
        <div class="net"></div>
        <div id="ball" class="ball"></div>
    </div>

    <script>
        function playBall() {
            const ball = document.getElementById('ball');
            
            // Reiniciem l'animació traient i tornant a posar la classe
            ball.classList.remove('animate-shot');
            void ball.offsetWidth; // Truc per forçar el "reflow" del DOM
            ball.classList.add('animate-shot');
        }
    </script>

</body>
</html>
